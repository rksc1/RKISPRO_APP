<script>
        // Micro-interaction for list items
        document.querySelectorAll('.glass-card button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.style.transform = 'scale(0.995)';
            });
            button.addEventListener('mouseup', () => {
                button.style.transform = 'scale(1)';
            });
            button.addEventListener('mouseleave', () => {
                button.style.transform = 'scale(1)';
            });
        });

        // Theme toggle simulation
        const themeToggle = document.querySelector('input[type="checkbox"]');
        themeToggle.addEventListener('change', (e) => {
            const body = document.querySelector('html');
            if(e.target.checked) {
                body.classList.add('dark');
            } else {
                body.classList.remove('dark');
            }
        });
    </script>
