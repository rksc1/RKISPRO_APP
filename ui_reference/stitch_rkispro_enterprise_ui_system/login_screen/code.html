<style>

        }

        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(at 0% 0%, rgba(69, 224, 232, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(238, 152, 0, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(0, 196, 204, 0.05) 0px, transparent 50%);
            z-index: -1;
        }

        .glass-panel {
            background: rgba(10, 24, 37, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(60, 73, 74, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .primary-button-glow {
            background: linear-gradient(135deg, #45e0e8 0%, #00c4cc 100%);
            transition: all 0.3s ease;
        }
        
        .primary-button-glow:hover {
            box-shadow: 0 0 20px rgba(69, 224, 232, 0.4);
            transform: translateY(-1px);
        }

        .input-dark {
            background-color: #060E14;
            border: 1px solid #1E3444;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-dark:focus {
            border-color: #45e0e8;
            box-shadow: 0 0 0 4px rgba(69, 224, 232, 0.1);
            outline: none;
        }

        .floating-label-group {
            position: relative;
        }

        .floating-label-group label {
            transition: all 0.2s ease;
            pointer-events: none;
        }

        .input-dark:focus + label,
        .input-dark:not(:placeholder-shown) + label {
            transform: translateY(-24px) scale(0.85);
            color: #45e0e8;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

</div>
<!-- Password Field -->
<div class="flex flex-col gap-sm">

<!-- Micro-interaction Scripts -->
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('visibilityIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        // Add subtle mouse-tracking to the background for atmospheric depth
        document.addEventListener('mousemove', (e) => {
            const { clientX, clientY } = e;
            const x = (clientX / window.innerWidth) * 100;
            const y = (clientY / window.innerHeight) * 100;
            
            const mesh = document.querySelector('.mesh-gradient');
            mesh.style.background = `
                radial-gradient(at ${x}% ${y}%, rgba(69, 224, 232, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 0%, rgba(69, 224, 232, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(238, 152, 0, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(0, 196, 204, 0.05) 0px, transparent 50%)
            `;
        });

        // Form submission animation mock
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const btn = e.target.querySelector('button[type="submit"]');
            const originalHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span><span>Authenticating...</span>`;
            
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span><span>Success</span>`;
                btn.classList.replace('primary-button-glow', 'bg-tertiary-container');
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    btn.disabled = false;
                    btn.classList.replace('bg-tertiary-container', 'primary-button-glow');
                }, 2000);
            }, 1500);
        });
    </script>
